<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>
    </head>
    <body>
        <header>
        <h1>설문지</h1><br>
            소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        </header>
        <hr>
        <section>
            <article>
                <form>
                학년
                <label>
                <input type="radio" name="grade" value="1">1학년
                </label>
                <label>
                <input type="radio" name="grade" value="2">2학년
                </label>
                <label>
                <input type="radio" name="grade" value="3">3학년
                </label>
                </form>
            </article>
            <br>
            <article>
                <form>
                성별
                <label>
                    <input type="radio" name="gender" value="1">남
                </label>
                <label>
                    <input type="radio" name="gender" value="2">여
                </label>
                </form>
            </article>
            <br>
            <article>
                <form>
                    관심분야
                    <select name="interest">
                        <option value="1">인공지능</option>
                        <option value="2">경영</option>
                        <option value="3">보안</option>
                    </select>
                </form>
            </article>
            <br>
            <article>
                <form>
                    진로
                    <label><input type="checkbox" value="1">개발</label>
                    <label><input type="checkbox" value="2">기획</label>
                    <label><input type="checkbox" value="3">영업</label>
                    <label><input type="checkbox" value="4">창업</label>
                </form>
            </article>
            <br>
            <article>
                <form>
                    남기고 싶은 말 <textarea cols="50" rows="10" placeholder="글을 남겨주세요"></textarea>
                </form>
            </article>
        </section>
    </body>
    <br>
    <footer>
        Copyright 2026 by MYONGJI COLLEGE
    </footer>
</html>
