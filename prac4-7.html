<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>:hover 활용</title>
        <style>
            img:hover{background-image:none ;}
        </style>
    </head>
    <body>
        <h3>:hover 활용</h3>
        <hr>
        <tr>
            <td>마우스를 올리면 카드의 앞면이 보인다.</td>
            <td><img src="media/트럼프카드 뒷면.png"></td>
        </tr>
    </body>
</html>
